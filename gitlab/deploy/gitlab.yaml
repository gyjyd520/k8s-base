---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  labels:
    app: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      # 优雅关闭时间
      terminationGracePeriodSeconds: 30
      
      # 初始化容器：验证依赖服务就绪
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command:
          - sh
          - -c
          - |
            until pg_isready -h postgresql -p 5432; do
              echo 'Waiting for PostgreSQL...'
              sleep 2
            done
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: db_pass
      
      - name: wait-for-redis
        image: redis:7-alpine
        command:
          - sh
          - -c
          - |
            until redis-cli -h redis -p 6379 ping; do
              echo 'Waiting for Redis...'
              sleep 2
            done

      containers:
      - name: gitlab
        image: sameersbn/gitlab:17.3.1
        imagePullPolicy: IfNotPresent
        
        env:
        # 容器时区设置（用于日志等），推荐使用区域名，例如 Asia/Shanghai
        - name: TZ
          value: Asia/Shanghai
        # 应用层时区（用于 UI / 邮件），建议与 TZ 一致并使用区域名
        - name: GITLAB_TIMEZONE
          value: Asia/Shanghai

        # GitLab 应用级别密钥（敏感），已改为从 Secret 读取
        - name: GITLAB_SECRETS_DB_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: gitlab_secrets_db_key_base
        - name: GITLAB_SECRETS_SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: gitlab_secrets_secret_key_base
        - name: GITLAB_SECRETS_OTP_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: gitlab_secrets_otp_key_base
        - name: GITLAB_SECRETS_ENCRYPTED_SETTINGS_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: gitlab_secrets_encrypted_settings_key_base

        # GitLab 初始管理员密码与邮箱（敏感），请在 Secret 中设置 root_password / root_email
        - name: GITLAB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: root_password
        - name: GITLAB_ROOT_EMAIL
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: root_email

        # GitLab 服务地址与端口（请根据实际部署调整为公网域名或内部服务名）
        - name: GITLAB_HOST
          value: gitlab.gongyongjun.com
        - name: GITLAB_PORT
          value: "80"
        - name: GITLAB_SSH_PORT
          value: "22"

        # 通知设置（字符串布尔值）
        - name: GITLAB_NOTIFY_ON_BROKEN_BUILDS
          value: "true"
        - name: GITLAB_NOTIFY_PUSHER
          value: "false"

        # 备份设置：频率与时间（注意时区）
        - name: GITLAB_BACKUP_SCHEDULE
          value: daily
        - name: GITLAB_BACKUP_TIME
          value: 01:00

        # 数据库连接配置；凭证部分从 Secret 读取
        - name: DB_TYPE
          value: postgres
        - name: DB_HOST
          value: postgresql
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: db_user
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: db_pass
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: db_name          

        # Redis 配置
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"

        # SMTP 配置；若启用请在 Secret 中提供 smtp_user / smtp_pass
        - name: SMTP_ENABLED
          value: "false"
        - name: SMTP_DOMAIN
          value: www.gongyongjun.com
        - name: SMTP_HOST
          value: smtp.gongyongjun.com
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: smtp_user
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: smtp_pass
        - name: SMTP_STARTTLS
          value: "true"
        - name: SMTP_AUTHENTICATION
          value: login

        # IMAP 配置；若启用请在 Secret 中提供 imap_user / imap_pass
        - name: IMAP_ENABLED
          value: "false"
        - name: IMAP_HOST
          value: imap.gongyongjun.com
        - name: IMAP_PORT
          value: "993"
        - name: IMAP_USER
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: imap_user
        - name: IMAP_PASS
          valueFrom:
            secretKeyRef:
              name: gitlab
              key: imap_pass
        - name: IMAP_SSL
          value: "true"
        - name: IMAP_STARTTLS
          value: "false"

        ports:
        - name: http
          containerPort: 80
        - name: ssh
          containerPort: 22

        # 资源限制（根据实际环境调整）
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        # 改进的健康检查
        livenessProbe:
          httpGet:
            path: /help
            port: 80
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /help
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - mountPath: /home/git/data
          name: data

        # 安全上下文
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

      volumes:
      - name: data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  labels:
    app: gitlab
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: gitlab

---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-ssh
  labels:
    app: gitlab
spec:
  type: NodePort
  ports:
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
      nodePort: 30022
  selector:
    app: gitlab

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: gitlab.gongyongjun.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gitlab
            port:
              number: 80
