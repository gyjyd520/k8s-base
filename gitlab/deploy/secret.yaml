# GitLab 认证凭据 Secret 配置
# 用于存储 GitLab 依赖服务的敏感信息（加密存储）
# ⚠️ 注意：此文件包含敏感信息（密钥/密码），生产环境应使用安全的 Secret 管理方案
# 推荐方案：
#   1. 使用 HashiCorp Vault、AWS Secrets Manager 等外部密钥管理系统
#   2. 使用 Sealed Secrets 或 External Secrets Operator 加密存储
#   3. 使用 GitOps + Secret 加密工具链（如 sops, kubeseal）

---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab
  # Secret 所在的命名空间，需与 GitLab 部署命名空间一致
  # 通常为 gitlab 命名空间
  namespace: gitlab
  labels:
    # 标签用于资源分类和选择
    app: gitlab
    component: secret
type: Opaque  # Secret 类型：Opaque 用于任意用户定义的数据（常用于存储密码、SSH 密钥等）

data:
  # ============ PostgreSQL 数据库配置 ============
  # 说明：这些凭据用于 GitLab 连接到 PostgreSQL 数据库
  
  # PostgreSQL 数据库用户名
  # 解码值: gitlab
  # 生成方法: echo -n "gitlab" | base64
  db_user: Z2l0bGFi
  
  # PostgreSQL 数据库用户密码
  # 解码值: postgresql12345
  # 生成方法: echo -n "postgresql12345" | base64
  # ⚠️ 强烈建议使用复杂且随机的密码，至少 16 个字符，包含大小写字母、数字、特殊符号
  db_pass: cG9zdGdyZXNxbDEyMzQ1
  
  # PostgreSQL 数据库名称
  # 解码值: gitlab
  # 生成方法: echo -n "gitlab" | base64
  # 说明：这是 GitLab 存储所有业务数据的数据库
  db_name: Z2l0bGFi

  # ============ GitLab 应用级别密钥（必需）============
  # 说明：这些是 GitLab 应用的核心加密密钥，用于加密敏感数据和会话
  # ⚠️ 重要：这些密钥必须随机生成，不要使用示例值
  # 生成方法：
  #   KEY=$(echo -n "$(openssl rand -base64 32)" | base64)
  #   echo $KEY
  
  # GitLab 数据库加密密钥
  # 解码值: 长随机字符串 (32+ 字符)
  # 用途：加密数据库中存储的敏感信息
  gitlab_secrets_db_key_base: YmdOd3dCVm1ydFVGRlJOWG5tS1dkNmJGOXBjMjlsUVMxWFlWQkJNVU5N
  
  # GitLab Secret Key Base
  # 解码值: 长随机字符串 (32+ 字符)
  # 用途：加密 Session、Cookie 等安全令牌
  gitlab_secrets_secret_key_base: QUhGMVEzQTVSekZPWTJ0SlEzcG1lVXBXWkhWTWVWbHdSRkJUVFUx
  
  # GitLab OTP 密钥 Base
  # 解码值: 长随机字符串 (32+ 字符)
  # 用途：生成一次性密码（2FA）
  gitlab_secrets_otp_key_base: T1hObmEyWlhkV3RKYldoaGRHeGxRMkZ0YW1GcFozQndZVXBY
  
  # GitLab Encrypted Settings Key Base
  # 解码值: 长随机字符串 (32+ 字符)
  # 用途：加密 GitLab 应用设置
  gitlab_secrets_encrypted_settings_key_base: TTBGMFExQkxSRkJ3YlZCR2VVdE5WekUyUjI5Nk9ITjNXVEJ3YW1z

  # ============ GitLab 初始管理员凭据 ============
  # 说明：用于首次登录 GitLab 的管理员账户凭据
  # ⚠️ 重要：部署完成后应立即修改这些凭据，并通过 GitLab UI 禁用默认 root 账户
  
  # 初始管理员密码
  # 解码值: Admin@Gitlab2024
  # 生成方法: echo -n "Admin@Gitlab2024" | base64
  # ⚠️ 建议修改为复杂密码：至少 12 字符，包含大小写字母、数字、特殊符号
  root_password: QWRtaW5AR2l0bGFiMjAyNA==
  
  # 初始管理员邮箱
  # 解码值: admin@gongyongjun.com
  # 生成方法: echo -n "admin@gongyongjun.com" | base64
  root_email: YWRtaW5AZ29uZ3lvbmp1bi5jb20=

  # ============ IMAP 邮件接收配置 ============
  # 说明：这些配置用于 GitLab 通过 IMAP 协议接收邮件
  #      使用场景：通过邮件创建 Issue、回复评论等
  # ⚠️ 注意：IMAP 功能默认禁用，启用前需要在 gitlab.yaml 中设置 IMAP_ENABLED=true
  
  # IMAP 邮箱用户名
  # 解码值: 122168214
  # 生成方法: echo -n "122168214" | base64
  imap_user: MTIyMTY4MjE0
  
  # IMAP 邮箱密码
  # 解码值: gyjyd520
  # 生成方法: echo -n "gyjyd520" | base64
  # ⚠️ 建议：
  #   1. 使用邮件服务提供商的应用专用密码（App Password）而非主账户密码
  #   2. 启用 OAuth2/OAuth 认证而非明文密码存储
  #   3. 定期轮换密码
  imap_pass: Z3lqeWQ1MjA=
  
  # IMAP 密码说明（用于维护人员参考）
  # 注意：这是注释，不会被 Kubernetes 处理
  # IMAP 实际密码: gyjyd520

  # ============ SMTP 邮件发送配置 ============
  # 说明：这些配置用于 GitLab 通过 SMTP 协议发送邮件
  #      使用场景：通知、警告、活动邮件等
  # ⚠️ 注意：SMTP 功能默认禁用，启用前需要在 gitlab.yaml 中设置 SMTP_ENABLED=true
  
  # SMTP 邮箱用户名（发送者邮箱地址）
  # 解码值: 122168214@qq.com
  # 生成方法: echo -n "122168214@qq.com" | base64
  # 说明：这是用于发送 GitLab 相关邮件的邮箱账户
  smtp_user: MTIyMTY4MjE0QHFxLmNvbQ==
  
  # SMTP 邮箱密码
  # 解码值: gyjyd520
  # 生成方法: echo -n "gyjyd520" | base64
  # ⚠️ 建议：
  #   1. 使用邮件服务提供商的应用专用密码而非主账户密码
  #   2. 对于企业邮箱，考虑使用 OAuth2 认证
  #   3. 配置发件人地址为组织官方邮箱（如 noreply@company.com）
  smtp_pass: Z3lqeWQ1MjA=
  
  # SMTP 密码说明（用于维护人员参考）
  # 注意：这是注释，不会被 Kubernetes 处理
  # SMTP 实际密码: gyjyd520

# ============ 使用示例 ============
# 此 Secret 在 GitLab 部署中被以下资源引用：
#
# 1. PostgreSQL Deployment
#    - 环境变量引用: DB_USER, DB_PASS, DB_NAME
#    - 用途：PostgreSQL 容器启动时初始化数据库
#    - 示例：
#      env:
#      - name: DB_USER
#        valueFrom:
#          secretKeyRef:
#            name: gitlab
#            key: db_user
#
# 2. GitLab 主程序 Deployment
#    - 用途：GitLab 启动时配置数据库连接、邮件系统、应用密钥
#    - 引用方式：通过环境变量从 Secret 读取
#    - 示例：
#      env:
#      - name: GITLAB_SECRETS_DB_KEY_BASE
#        valueFrom:
#          secretKeyRef:
#            name: gitlab
#            key: gitlab_secrets_db_key_base
#
# ============ 安全最佳实践 ============
#
# 1. Secret 创建和管理
#    - ✅ 不要将 Secret 提交到 Git 仓库（使用 .gitignore）
#    - 使用 kubectl create secret 命令从环境变量或文件创建
#    - 启用 etcd 加密（--encryption-provider-config）
#
# 2. 密钥轮换
#    - 定期修改数据库密码、邮件密码等
#    - 创建新 Secret，更新 Deployment，删除旧 Secret
#    - ⚠️ 应用级别密钥（如 db_key_base）一旦生成就不应轻易修改
#
# 3. 访问控制
#    - 使用 RBAC 限制哪些账户可以读取此 Secret
#    - 示例 Role:
#      rules:
#      - apiGroups: [""]
#        resources: ["secrets"]
#        resourceNames: ["gitlab"]
#        verbs: ["get"]
#
# 4. 审计日志
#    - 启用 Kubernetes 审计日志记录 Secret 访问
#    - 定期检查 Secret 访问日志
#
# 5. 外部密钥管理
#    - 考虑使用 External Secrets Operator（ESO）
#    - 集成企业 Vault、AWS Secrets Manager 等
#    - 示例：
#      apiVersion: external-secrets.io/v1beta1
#      kind: SecretStore
#      metadata:
#        name: vault-backend
#      spec:
#        provider:
#          vault:
#            server: "https://vault.example.com"
#            path: "secret"
#            auth:
#              kubernetes:
#                mountPath: "kubernetes"
#
# ============ Secret 编码/解码参考 ============
#
# 查看 Secret 的实际值（需要足够权限）：
#   kubectl get secret gitlab -n gitlab -o yaml
#
# 手动编码字符串为 Base64：
#   echo -n "your-password" | base64
#
# 手动解码 Base64 字符串：
#   echo "bWFnZWR1LmNvbQ==" | base64 -d
#
# 注意：Base64 编码不是加密，仅是编码方式。真正的加密需要在 etcd 级别启用。
#
# ============ 更新 Secret 的步骤 ============
#
# 1. 生成新的随机密钥
#    # 生成 Base64 编码的随机密钥
#    NEW_KEY=$(echo -n "$(openssl rand -base64 32)" | base64)
#    echo $NEW_KEY
#
# 2. 编辑 Secret 或创建新 Secret
#    kubectl patch secret gitlab -n gitlab -p '{"data":{"db_pass":"<new-base64-encoded-password>"}}'
#
# 3. 重启使用此 Secret 的 Pod
#    kubectl rollout restart deployment/postgresql -n gitlab
#    kubectl rollout restart deployment/gitlab -n gitlab
#
# 4. 验证更新
#    kubectl get pods -n gitlab -l app=gitlab -w
#
# ============ 部署后检查清单 ============
#
# □ 验证 Secret 已正确创建：
#   kubectl get secret gitlab -n gitlab
#
# □ 检查 Secret 数据完整性：
#   kubectl describe secret gitlab -n gitlab
#
# □ GitLab 启动后修改 root 用户密码：
#   1. 使用 root_password 登录
#   2. 进入 Admin > Users > root
#   3. 修改为强密码
#
# □ 启用 SMTP/IMAP 前测试配置：
#   1. 在 gitlab.yaml 中启用对应服务（SMTP_ENABLED=true）
#   2. 在 GitLab Admin 界面测试邮件配置
#   3. 发送测试邮件验证功能
#
# □ 定期备份和轮换密钥：
#   - 每月检查密钥使用情况
#   - 每 3-6 个月轮换一次密码（SMTP/IMAP 除外）
#   - 保留备份记录以防需要回滚
